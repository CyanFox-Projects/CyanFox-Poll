name: Releaser

on:
  push:
    branches:
      - master
      
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: List Files
      run: ls
      
    - name: "Build & test"
      run: |
        echo "done!"
        
    - uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        prerelease: false
        title: "Releases"
        files: |
          LICENSE.txt
          Release_Notes.txt
